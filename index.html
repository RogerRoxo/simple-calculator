<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="calc">
        <div class="grid">
            <div class="display">
                <p class="display-text">0</p>
            </div>
            <div class="empt"></div>
            <button class="button" onclick="clearAccount()">C</button>
            <button class="button" onclick="addToAccount(this)">7</button>
            <button class="button" onclick="addToAccount(this)">8</button>
            <button class="button" onclick="addToAccount(this)">9</button>
            <button class="button" onclick="addToAccount(this)">÷</button>
            <button class="button" onclick="addToAccount(this)">4</button>
            <button class="button" onclick="addToAccount(this)">5</button>
            <button class="button" onclick="addToAccount(this)">6</button>
            <button class="button" onclick="addToAccount(this)">×</button>
            <button class="button" onclick="addToAccount(this)">1</button>
            <button class="button" onclick="addToAccount(this)">2</button>
            <button class="button" onclick="addToAccount(this)">3</button>
            <button class="button" onclick="addToAccount(this)">-</button>
            <button class="button" onclick="addToAccount(this)">0</button>
            <button class="button" onclick="addToAccount(this)">.</button>
            <button class="button" onclick="equalsAccount()">=</button>
            <button class="button" onclick="addToAccount(this)">+</button>
        </div>
    </div>
    
    <script src="script.js"></script>
    
</body>
</html>
